<!DOCTYPE html>
<html lang="es">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🏆 Quiniela Mundial 2026</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="data.js"></script>
<script type="module" src="firebase.js"></script>
<script defer src="app.js"></script>

</head>

<body>

<h1>🏆 Quiniela Mundial 2026</h1>

<!-- PESTAÑAS -->
<div class="tabs">

<button class="tab-btn active" data-tab="resumen">🏆 Resumen</button>
<button class="tab-btn" data-tab="rankingTab">📊 Ranking</button>
<button class="tab-btn" data-tab="calendario">⚽ Calendario</button>
<button class="tab-btn" data-tab="estadisticas">📈 Estadísticas</button>
</div>

<!-- RESUMEN -->
<div id="resumen" class="tab-content active">

<div class="dashboard">

<div class="card">
<h2>Participantes</h2>
<div id="totalPlayers"></div>
</div>

<div class="card">
<h2>Equipos Vivos</h2>
<div id="aliveTeamsCount"></div>
</div>

<div class="card">
<h2>Ganador</h2>
<div id="winner"></div>
</div>

</div>

<!-- Se deja oculto para compatibilidad con app.js -->
<select id="championSelect" style="display:none;">
<option value="">Selecciona</option>
</select>

<h2>👥 Participantes</h2>

<div id="participantsContainer"></div>

</div>

<!-- RANKING -->
<div id="rankingTab" class="tab-content">

<h2>⭐ Ranking</h2>

<div id="ranking"></div>

</div>

<!-- CALENDARIO -->
<div id="calendario" class="tab-content">

<h2>⚽ Calendario Mundial 2026</h2>

<div id="matchesContainer"></div>

</div>

<!-- ESTADÍSTICAS -->
<div id="estadisticas" class="tab-content">

<h2>📈 Estadísticas</h2>

<canvas id="probabilityChart"></canvas>

</div>

</body>
</html>
